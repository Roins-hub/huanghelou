    <text x="38" y="56" class="stage-title">System Integration Statement</text>
    <text x="38" y="98" class="caption">The system integrates WebGL-based cultural heritage visualization, real-time gesture recognition, multimodal exhibition interaction, and LLM-powered knowledge services into a deployable intelligent digital tourism platform.</text>
    <text x="38" y="132" class="caption">系统融合 WebGL 文化遗产可视化、实时手势识别、多模态展陈交互与大语言模型知识服务，构建可部署的智慧文旅沉浸式数字平台。</text>
