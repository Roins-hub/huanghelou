      .stage-title{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;font-size:27px;font-weight:800;fill:#1f2d2f}
      .stage-en{font-family:Arial,sans-serif;font-size:17px;font-weight:700;letter-spacing:.04em;fill:#5a7075}
      .body{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;font-size:21px;fill:#2d3c3f}
      .caption{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;font-size:18px;fill:#607175}
      .tag{font-family:Arial,sans-serif;font-size:15px;font-weight:700;letter-spacing:.08em;fill:white}
      .small{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;font-size:18px;fill:#354548}
      .code{font-family:Consolas,"Courier New",monospace;font-size:18px;fill:#34545d}
